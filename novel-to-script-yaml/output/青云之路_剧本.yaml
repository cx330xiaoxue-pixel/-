  chapters:
  - chapter_id: 1
    chapter_title: 01 初入江湖
    source_chapter: 1
    summary: 涉及角色：他没有再、小二、山路、晨风吹过、林清风、林清风转、清晨的阳、老槐、苏婉、角色。 开场：第一章 初入江湖...
    scene_count: 2
    element_count: 29
    scenes:
    - scene_id: '1.1'
      scene_number: 1
      location: 室外-森林
      time: 清晨
      atmosphere: 温馨
      element_count: 15
      elements:
      - element_id: 1.1.1
        type: narration
        role: 旁白
        text: 第一章 初入江湖
      - element_id: 1.1.2
        type: action
        role: 清晨的阳
        text: 清晨的阳光透过竹林的缝隙洒在地上，形成斑驳的光影。林清风背着行囊，站在村口的老槐树下，回头望了一眼这个生活了十八年的小村庄。
        action: 移动
      - element_id: 1.1.3
        type: dialogue
        role: 角色
        text: 清风哥，你真的要走吗？
      - element_id: 1.1.4
        type: action
        role: 林清风转
        text: 林清风转身，看见邻家少女苏婉儿正站在不远处，眼眶微红。她穿着一身淡青色的长裙，晨风拂过，裙摆轻轻飘动。
        emotion: 温柔
        action: 移动
      - element_id: 1.1.5
        type: dialogue
        role: 角色
        text: 婉儿，我必须走。
        action: 手势
      - element_id: 1.1.6
        type: dialogue
        role: 角色
        text: 师父说过，修行之路不进则退。我已经十八岁了，再不去见见世面，这辈子就只能在这小山村里种地了。
        action: 手势
      - element_id: 1.1.7
        type: dialogue
        role: 苏婉
        text: 这是我连夜绣的，里面装了些安神的草药。你...你在外面要照顾好自己。
      - element_id: 1.1.8
        type: dialogue
        role: 林清风
        text: 三年。三年之内，我一定回来。
        action: 头部动作
      - element_id: 1.1.9
        type: action
        role: 晨风吹过
        text: 晨风吹过，竹叶沙沙作响，仿佛在为这个即将远行的少年送行。林清风转过身，迈开步子，踏上了通向山外的蜿蜒小路。
      - element_id: 1.1.10
        type: action
        role: 他没有再
        text: 他没有再回头。因为他知道，如果再回头看一眼，他可能就真的走不了了。
        action: 移动
      - element_id: 1.1.11
        type: dialogue
        role: 老槐
        text: 保重...
      - element_id: 1.1.12
        type: dialogue
        role: 山路
        text: 青云镇
      - element_id: 1.1.13
        type: dialogue
        role: 角色
        text: 客官，里面请！本店有上好的灵茶，还有新鲜出炉的灵兽肉包子！
      - element_id: 1.1.14
        type: narration
        role: 旁白
        text: 林清风摸了摸怀中的银两，犹豫了一下，还是走了进去。客栈里人声鼎沸，大多是些粗犷的江湖客，也有几个身着劲装、腰佩长剑的修行者。
      - element_id: 1.1.15
        type: dialogue
        role: 角色
        text: 听说了吗？青云宗的入门考核下个月就要开始了！
    - scene_id: '1.2'
      scene_number: 2
      location: 室外-森林
      time: 未指定
      atmosphere: 紧张
      element_count: 14
      elements:
      - element_id: 1.2.16
        type: dialogue
        role: 角色
        text: 当然听说了！这次据说有三百多人报名，只录取三十个。
        action: 头部动作
      - element_id: 1.2.17
        type: dialogue
        role: 角色
        text: 而且今年还多了一个特殊的考核项目——猎杀一只二阶妖兽。
        action: 头部动作
      - element_id: 1.2.18
        type: dialogue
        role: 角色
        text: 二阶妖兽？那不是要人命吗？一个刚入门的修行者哪能对付得了二阶妖兽？
      - element_id: 1.2.19
        type: dialogue
        role: 角色
        text: 所以才说今年特别难啊。不过奖励也丰厚，听说前三名可以直接获得一枚聚气丹，那可是能让人直接突破到聚气境的好东西！
      - element_id: 1.2.20
        type: narration
        role: 旁白
        text: 林清风竖着耳朵听着，心中既激动又紧张。青云宗，正是他此行的目的地。师父临终前给他的那封信，就是写给青云宗一位故人的。只要找到那位故人，他就有机会参加入门考核。
        emotion: 紧张
      - element_id: 1.2.21
        type: dialogue
        role: 角色
        text: 小二，来一壶茶。
      - element_id: 1.2.22
        type: narration
        role: 旁白
        text: 一个身穿锦袍的年轻人大步走了进来，身后跟着四个黑衣护卫。年轻人面容俊朗，但眉宇间带着一股傲慢之气，一看就是有来头的人物。
      - element_id: 1.2.23
        type: dialogue
        role: 角色
        text: 赵公子！
      - element_id: 1.2.24
        type: dialogue
        role: 角色
        text: 您今天怎么有空来小店？
      - element_id: 1.2.25
        type: dialogue
        role: 角色
        text: 少废话！
      - element_id: 1.2.26
        type: dialogue
        role: 角色
        text: 我问你，刚才有没有看见一个背着蓝色包袱的年轻人进来？
      - element_id: 1.2.27
        type: narration
        role: 旁白
        text: 林清风心中一动——蓝色包袱，那不正是自己背的包袱吗？
      - element_id: 1.2.28
        type: dialogue
        role: 小二
        text: 小子，把你包袱里的东西交出来，饶你一命。
        action: 表情
      - element_id: 1.2.29
        type: narration
        role: 旁白
        text: 客栈里突然安静下来，所有人都看向林清风。
  - chapter_id: 2
    chapter_title: 02 客栈风波
    source_chapter: 2
    summary: 涉及角色：一名护卫、就在、林清、等赵、角色、赵公、陈长、陈长老。 开场：第二章 客栈风波...
    scene_count: 3
    element_count: 34
    scenes:
    - scene_id: '2.1'
      scene_number: 1
      location: 室外-森林
      time: 未指定
      atmosphere: 中性
      element_count: 15
      elements:
      - element_id: 2.1.1
        type: narration
        role: 旁白
        text: 第二章 客栈风波
      - element_id: 2.1.2
        type: narration
        role: 旁白
        text: 林清风的手悄悄按在了腰间的短刀上。这把刀是师父留给他的遗物，虽然不是什么神兵利器，但对付一般的江湖人绰绰有余。
      - element_id: 2.1.3
        type: dialogue
        role: 角色
        text: 这位公子，你我素不相识，为何要我的包袱？
      - element_id: 2.1.4
        type: dialogue
        role: 赵公
        text: 素不相识？小子，你在山路上捡到的那个包袱，是我派人放在那里等接头人取的。乖乖交出来，本公子就当什么都没发生过。
      - element_id: 2.1.5
        type: narration
        role: 旁白
        text: 林清风恍然大悟。他在山路上确实捡到了一个蓝色包袱，里面除了一些银两，还有一本泛黄的古籍和一封密信。他本打算到了青云镇就交给衙门，没想到正主找上门来了。
      - element_id: 2.1.6
        type: dialogue
        role: 角色
        text: 原来是公子的东西。
      - element_id: 2.1.7
        type: dialogue
        role: 角色
        text: 不过在下有几个疑问：第一，既然是公子之物，为何会出现在荒山野岭？第二，既是接头所用，接头之人是谁？第三——
      - element_id: 2.1.8
        type: dialogue
        role: 角色
        text: 啰嗦！
      - element_id: 2.1.9
        type: dialogue
        role: 角色
        text: 给我拿下！
      - element_id: 2.1.10
        type: narration
        role: 旁白
        text: 话音未落，四个黑衣护卫同时出手。他们配合默契，两人攻上，两人攻下，显然训练有素。
      - element_id: 2.1.11
        type: dialogue
        role: 林清
        text: 清风诀
      - element_id: 2.1.12
        type: dialogue
        role: 角色
        text: 嘭！
      - element_id: 2.1.13
        type: action
        role: 一名护卫
        text: 一名护卫被气劲击中，踉跄后退了好几步，撞翻了一张桌子，碗碟碎了一地。
      - element_id: 2.1.14
        type: dialogue
        role: 角色
        text: 真气外放？
      - element_id: 2.1.15
        type: dialogue
        role: 角色
        text: 你竟然已经凝气成功了？
    - scene_id: '2.2'
      scene_number: 2
      location: 室内-楼阁
      time: 未指定
      atmosphere: 中性
      element_count: 15
      elements:
      - element_id: 2.2.16
        type: narration
        role: 旁白
        text: 客栈里的其他修行者也纷纷侧目。十八岁就能凝气外放，虽然不算天才，但也绝不是庸才。
      - element_id: 2.2.17
        type: dialogue
        role: 角色
        text: 我说了，我不想动手。
        action: 武器动作
      - element_id: 2.2.18
        type: dialogue
        role: 就在
        text: 住手！
      - element_id: 2.2.19
        type: narration
        role: 旁白
        text: 一个白发老者从楼梯上缓缓走了下来。他穿着一件洗得发白的道袍，手里拄着一根青竹杖，看着平平无奇，但那双眼睛却炯炯有神，让人不敢直视。
      - element_id: 2.2.20
        type: dialogue
        role: 角色
        text: 陈长老！
        action: 礼仪动作
      - element_id: 2.2.21
        type: dialogue
        role: 角色
        text: 赵家的小子，
      - element_id: 2.2.22
        type: dialogue
        role: 角色
        text: 这里是青云镇，不是你赵家的后花园。要作威作福，回你的锦州城去。
      - element_id: 2.2.23
        type: dialogue
        role: 赵公
        text: 走！
        action: 移动
      - element_id: 2.2.24
        type: dialogue
        role: 赵公
        text: 小子，咱们走着瞧！
        action: 移动
      - element_id: 2.2.25
        type: dialogue
        role: 等赵
        text: 年轻人，你包袱里的东西，拿出来让我看看。
      - element_id: 2.2.26
        type: narration
        role: 旁白
        text: 林清风犹豫了一瞬，还是从包袱中取出了那本泛黄的古籍和密信。陈长老接过东西，先看了看古籍的封面，脸色骤然一变。
      - element_id: 2.2.27
        type: dialogue
        role: 角色
        text: 《青云残卷》？！
      - element_id: 2.2.28
        type: dialogue
        role: 角色
        text: 这是三百年前青云宗遗失的镇宗功法！你从哪里得到的？
      - element_id: 2.2.29
        type: narration
        role: 旁白
        text: 整个客栈瞬间炸开了锅。青云宗的镇宗功法失踪三百年，江湖上流传着无数版本的故事，有人说被魔教偷走了，有人说被叛徒毁掉了，还有人说功法根本就不存在。没想到，这本传说中的功法竟然落到了一个毛头小子手里。
      - element_id: 2.2.30
        type: dialogue
        role: 角色
        text: 在山路上捡的。
    - scene_id: '2.3'
      scene_number: 3
      location: 未指定
      time: 未指定
      atmosphere: 中性
      element_count: 4
      elements:
      - element_id: 2.3.31
        type: dialogue
        role: 陈长
        text: 孩子，你可知道你手里捧的是多大的机缘？又是多大的麻烦？
        action: 呼吸
      - element_id: 2.3.32
        type: dialogue
        role: 角色
        text: 知道。
      - element_id: 2.3.33
        type: dialogue
        role: 角色
        text: 所以我想请前辈指点——这东西该交给谁？
      - element_id: 2.3.34
        type: dialogue
        role: 陈长老
        text: 好小子，面对如此至宝不贪不占，心性不错。走吧，跟我上青云宗，我要亲自带你去见宗主。
        action: 表情
  - chapter_id: 3
    chapter_title: 03 青云之路
    source_chapter: 3
    summary: 涉及角色：林清风、角色。 开场：第三章 青云之路...
    scene_count: 4
    element_count: 46
    scenes:
    - scene_id: '3.1'
      scene_number: 1
      location: 室外-道路
      time: 未指定
      atmosphere: 忧伤
      element_count: 15
      elements:
      - element_id: 3.1.1
        type: narration
        role: 旁白
        text: 第三章 青云之路
      - element_id: 3.1.2
        type: narration
        role: 旁白
        text: 青云宗的山门矗立在青云山主峰之上，云雾缭绕，宛如仙境。林清风跟在陈长老身后，沿着数万级石阶拾级而上，周围的灵气浓度远超他之前见过的任何地方。
      - element_id: 3.1.3
        type: dialogue
        role: 角色
        text: 陈长老，我想请教一个问题。
      - element_id: 3.1.4
        type: dialogue
        role: 角色
        text: 说吧。
      - element_id: 3.1.5
        type: dialogue
        role: 角色
        text: 师父临死前，给了我一封信，让我交给青云宗的一个人。那个人叫——
      - element_id: 3.1.6
        type: dialogue
        role: 角色
        text: 你师父叫什么名字？
      - element_id: 3.1.7
        type: dialogue
        role: 角色
        text: 师父说他叫楚天河。
      - element_id: 3.1.8
        type: narration
        role: 旁白
        text: 陈长老浑身一震，手中的青竹杖当啷一声掉在了地上。他盯着林清风看了许久，眼中竟然泛起了一丝泪光。
        emotion: 悲伤
      - element_id: 3.1.9
        type: dialogue
        role: 角色
        text: 楚...天河？
      - element_id: 3.1.10
        type: dialogue
        role: 角色
        text: 你是天河的弟子？
      - element_id: 3.1.11
        type: dialogue
        role: 角色
        text: 前辈认识我师父？
      - element_id: 3.1.12
        type: dialogue
        role: 角色
        text: 何止认识。
      - element_id: 3.1.13
        type: dialogue
        role: 角色
        text: 三十年前，我和你师父是青云宗最要好的师兄弟。后来他因故离开了宗门，从此音讯全无。我找了他整整三十年，没想到...
      - element_id: 3.1.14
        type: narration
        role: 旁白
        text: 林清风也愣住了。他从怀中掏出那封已经泛黄的信，双手呈给陈长老。陈长老接过信，看到信封上的字迹，眼泪终于夺眶而出。
        emotion: 悲伤
      - element_id: 3.1.15
        type: dialogue
        role: 角色
        text: 是他的字...不会错...
    - scene_id: '3.2'
      scene_number: 2
      location: 室外-河边
      time: 未指定
      atmosphere: 中性
      element_count: 15
      elements:
      - element_id: 3.2.16
        type: dialogue
        role: 角色
        text: 信上说了什么？
      - element_id: 3.2.17
        type: dialogue
        role: 角色
        text: 师父让我把信交给青云宗的古长老。他说，只要古长老看了信，就会收我为徒。
      - element_id: 3.2.18
        type: narration
        role: 旁白
        text: 陈长老沉默了片刻，缓缓拆开了信封。信纸已经发黄发脆，字迹却依然清晰。
      - element_id: 3.2.19
        type: narration
        role: 旁白
        text: '"吾兄古月：'
      - element_id: 3.2.20
        type: narration
        role: 旁白
        text: 别来无恙三十载。
      - element_id: 3.2.21
        type: narration
        role: 旁白
        text: 弟漂泊半生，一事无成，唯得小徒清风一人，资质尚可，心性纯良。今弟大限将至，唯有一愿——望兄看在多年情分上，收清风入青云宗门下。清风虽非天纵之才，但胜在勤勉，若得良师指点，必成大器。
      - element_id: 3.2.22
        type: narration
        role: 旁白
        text: 弟无以为报，唯有一言：青云残卷，弟已找回。清风会带着残卷来找你。
      - element_id: 3.2.23
        type: narration
        role: 旁白
        text: 弟 楚天河 绝笔"
      - element_id: 3.2.24
        type: narration
        role: 旁白
        text: 陈长老看完信，闭上眼睛，久久没有说话。山风呼啸，拂动着他的白发和旧道袍。
      - element_id: 3.2.25
        type: dialogue
        role: 角色
        text: 古长老...
      - element_id: 3.2.26
        type: dialogue
        role: 角色
        text: 就是你师父要你找的人。我就是古月。
      - element_id: 3.2.27
        type: dialogue
        role: 角色
        text: 什么？
      - element_id: 3.2.28
        type: dialogue
        role: 角色
        text: 可是您刚才明明说您是陈长老...
      - element_id: 3.2.29
        type: dialogue
        role: 角色
        text: 陈是我母亲的姓。自从你师父走后，我就改名换姓，不再用古月这个名字了。
        action: 表情
      - element_id: 3.2.30
        type: dialogue
        role: 角色
        text: 三十年恩怨，三千年修行。到头来，不过是一场空。
        action: 表情
    - scene_id: '3.3'
      scene_number: 3
      location: 室外-森林
      time: 未指定
      atmosphere: 悬疑
      element_count: 15
      elements:
      - element_id: 3.3.31
        type: narration
        role: 旁白
        text: 林清风听得一头雾水，但他敏锐地感觉到，师父和这位古长老之间一定发生过很复杂的事情。不过此刻不是追问的时机。
      - element_id: 3.3.32
        type: dialogue
        role: 角色
        text: 古长老，
        action: 礼仪动作
      - element_id: 3.3.33
        type: dialogue
        role: 角色
        text: 求您收我为徒。
        action: 礼仪动作
      - element_id: 3.3.34
        type: narration
        role: 旁白
        text: 古月伸手将他扶了起来，仔细端详着他的脸，仿佛在透过他看另一个人。
        action: 手势
      - element_id: 3.3.35
        type: dialogue
        role: 角色
        text: 你师父的信里说你资质尚可——他骗了我。
      - element_id: 3.3.36
        type: dialogue
        role: 角色
        text: 你的资质不是尚可。你的体质是百年难遇的青木灵体，天生亲和木属性灵气。这种体质最适合修炼我青云宗的功法。
      - element_id: 3.3.37
        type: narration
        role: 旁白
        text: 林清风又惊又喜。师父生前从未跟他说过这些。
        emotion: 惊讶
      - element_id: 3.3.38
        type: dialogue
        role: 角色
        text: 从今天起，你就是我古月的关门弟子。
      - element_id: 3.3.39
        type: dialogue
        role: 角色
        text: 三个月后的入门考核，你可以直接跳过初试，作为种子选手参加终试。不过你要答应我两件事。
      - element_id: 3.3.40
        type: dialogue
        role: 角色
        text: 师父请说！
      - element_id: 3.3.41
        type: dialogue
        role: 角色
        text: 第一，青云残卷的秘密，暂时不要让第三个人知道。
      - element_id: 3.3.42
        type: dialogue
        role: 角色
        text: 弟子明白。
      - element_id: 3.3.43
        type: dialogue
        role: 角色
        text: 第二——
      - element_id: 3.3.44
        type: dialogue
        role: 角色
        text: 三个月后的终试上，你要击败所有对手，堂堂正正地拿到第一名。让所有人看看，楚天河的弟子，不比任何人差。
      - element_id: 3.3.45
        type: dialogue
        role: 林清风
        text: 弟子定不辱命！
    - scene_id: '3.4'
      scene_number: 4
      location: 室外-山野
      time: 未指定
      atmosphere: 中性
      element_count: 1
      elements:
      - element_id: 3.4.46
        type: narration
        role: 旁白
        text: 青云山的钟声响起，悠扬的钟声穿透云层，回荡在群山之间。山巅之上，云雾翻涌，仿佛预示着一段传奇即将拉开序幕。
