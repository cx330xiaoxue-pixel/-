# ============================================================
# Novel-to-Script Pro — 全局配置文件
# ============================================================

# ── LLM API 配置（主模型，用于文本分析/生成）──
llm:
  provider: "deepseek"              # deepseek | openai | custom
  api_key: "sk-YOUR-API-KEY"        # 替换为你的 API Key，或设置环境变量
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.7
  max_tokens: 8192

# ── 备用 LLM（用于轻量任务，如摘要、分类）──
llm_light:
  provider: "deepseek"
  api_key: "sk-YOUR-API-KEY"
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 2048

# ── 图片生成 API 配置（Doubao Seedream 5.0）──
image_gen:
  provider: "ark"
  api_key: "ark-47451241-920f-432c-b2e3-481781e9ce34-8c5f3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "doubao-seedream-5-0-260128"
  default_size: "2K"
  default_quality: "high"

# ── 图片反推 API 配置 ──
image_reverse:
  provider: "ark"
  api_key: "ark-47451241-920f-432c-b2e3-481781e9ce34-8c5f3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "doubao-seedream-5-0-260128"

# ── 视频生成 API 配置（Doubao Seedance 1.5 Pro）──
video_gen:
  provider: "ark"
  api_key: "ark-47451241-920f-432c-b2e3-481781e9ce34-8c5f3"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  submit_url: "https://ark.cn-beijing.volces.com/api/v3/video/generations"
  task_url: "https://ark.cn-beijing.volces.com/api/v3/video/generations"
  model: "doubao-seedance-1-5-pro"

# ── 文本处理配置 ──
processing:
  window_size: 40                   # 滑窗行数
  overlap_rate: 0.5                 # 窗口重叠率 (0-1)
  max_workers: 4                    # 并行处理线程数
  retry_times: 3                    # API 调用失败重试次数
  chunk_size: 2000                  # 长文本分块大小（字符数）

# ── 输出配置 ──
output:
  format: "yaml"                    # yaml (未来可扩展: json, markdown, fountain)
  output_dir: "./output"
  include_emotion: true             # 是否包含情绪标注
  include_action: true              # 是否包含动作标注
  include_subtext: true             # 是否包含潜台词
  include_visual_hint: true         # 是否包含视觉化提示
  language: "zh-CN"                 # 输出语言
  auto_backup: true                 # 是否自动备份

# ── 管线配置 ──
pipeline:
  review_passes: 2                  # 审核通过需要的最小 PASS 数
  max_rewrite_rounds: 3             # 单集最多回改轮次
  auto_continue: false              # 是否自动进入下一阶段
  storyboard_mode: "film"           # 默认分镜模式: film | seedance
  reference_script_count: 5         # 爆款参考剧本检索数量

# ── 合规检查配置 ──
compliance:
  enable_sensitive_check: true      # 是否启用敏感词检查
  enable_platform_check: true       # 是否启用平台规范检查
  custom_blacklist: []              # 自定义禁用词列表
  target_platform: "generic"        # 目标平台: generic | youku | iqiyi | tencent | bilibili

# ── 内容分级配置 ──
content_grading:
  enabled: true                    # 是否启用内容分级
  mode: "balanced"                 # strict(忠于原著) | balanced(默认) | loose(适配影视节奏)
  s_level_threshold: 0.6           # S级置信度阈值 (0-1)
  a_level_threshold: 0.35          # A级置信度阈值 (0-1)
  max_merged_narration_chars: 50   # B级合并旁白最大字数
  llm_borderline_review: true      # 是否LLM复核边界案例
  repetition_similarity: 0.6       # 重复检测相似度阈值

# ── 智能分集配置 ──
episode_rhythm:
  enabled: true                    # 是否启用智能分集
  target_format: "long_drama"      # short_drama(3-5min/集) | long_drama(45min/集)
  short_drama_scenes: 2            # 短剧每集场景数
  long_drama_scenes: 10            # 长剧每集场景数
  cliffhanger_required: true       # 每集是否必须有悬念结尾
  min_conflict_per_episode: 1      # 每集最小冲突节点数
  max_chapters_per_episode: 5      # 每集最大覆盖章节数
  generate_investor_notes: true    # 是否生成招商审核备注

# ── 知识库配置 ──
knowledge:
  sources_dir: "./sources"          # 原始材料目录
  pending_dir: "./pending-knowledge" # 待处理知识目录
  hit_scripts_dir: "./knowledge/hit_scripts"
  auto_index: true                  # 是否自动建索引
